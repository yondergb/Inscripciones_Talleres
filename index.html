<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscripción Taller</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <div class="top-bar">
    <a href="admin.html" class="btn-admin">Administrador</a>
  </div>

  <h1>Taller de Excel Básico</h1>

  <div id="contador" class="contador"></div>
  <div id="mensaje" class="mensaje"></div>

  <form id="formulario">
    <input type="text" id="nombres" placeholder="Nombres" required>
    <input type="text" id="apellidos" placeholder="Apellidos" required>
    <input type="text" id="cedula" placeholder="Cédula" required>
    <input type="text" id="telefono" placeholder="Teléfono" required>
    <input type="date" id="fechaNacimiento" placeholder="Fecha Nacimiento" required>

    <button type="submit">Inscribirse</button>
  </form>

</div>

<script src="script.js"></script>
</body>
</html>
