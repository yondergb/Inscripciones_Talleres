<!DOCTYPE html>

<head>

</head>
<body>

<div class="container">

  <div class="top-bar">

    <h2>Sistema de Inscripción Talleres</h2>
    <div id="contador" class="contador"></div>
    <div id="mensaje" class="mensaje"></div>
  
  <form id="formulario">
    <input type="text" pattern="[A-Za-zñÑáéíóúÁÉÍÓÚ\s]+"title="Solo se permiten letras y espacios" id="nombres" placeholder="Nombres" required>
    <input type="text" pattern="[A-Za-zñÑáéíóúÁÉÍÓÚ\s]+"title="Solo se permiten letras y espacios" id="apellidos" placeholder="Apellidos" required>
    <input type="text" pattern="[0-9]*" title="Por favor, ingrese solo números" id="cedula" placeholder="Cédula" required>
    <input type="text" pattern="[0-9]*" title="Por favor, ingrese solo números" id="telefono" placeholder="Teléfono" required>
    <input type="date" id="fechaNacimiento" required>
    <label id="fechaNacimiento">Fecha de Nacimiento</label>

    <button id="inscribirse" type="submit"
>    Inscribirse</button>
  </form>
  <div class="img">

  </div>

</div>
